<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Cia - Monte seu Pedido</title>
    <style>
        :root { --primary: #ff6600; --dark: #121212; --card: #1e1e1e; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; padding-bottom: 130px; }
        
        header { background: #000; border-bottom: 4px solid var(--primary); text-align: center; padding: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        .section-title { color: var(--primary); border-bottom: 2px solid var(--primary); padding: 10px 0 5px; margin-top: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }

        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-item { background: var(--card); border: 2px solid #333; color: white; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.85rem; position: relative; }
        .btn-item.selected { border-color: var(--primary); background: rgba(255, 102, 0, 0.1); font-weight: bold; }
        .price-tag { display: block; font-size: 0.7rem; color: var(--primary); margin-top: 4px; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 3px solid var(--primary); padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .total-box b { font-size: 1.5rem; color: var(--primary); display: block; }
        .btn-whatsapp { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #panel-adm { display: none; background: #222; border: 2px solid var(--primary); padding: 15px; border-radius: 10px; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 5px; border: none; box-sizing: border-box; }
        .adm-list-item { display: flex; justify-content: space-between; background: #333; padding: 8px; margin-bottom: 5px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color:var(--primary);">SABOR & CIA</h1>
    <small>MONTE SUA MARMITA & BEBIDAS</small>
</header>

<div class="container">
    <div id="menu-cliente">
        <div class="section-title">1. Escolha o Arroz / Base</div>
        <div id="list-base" class="item-grid"></div>

        <div class="section-title">2. Escolha o Feijão</div>
        <div id="list-feijao" class="item-grid"></div>

        <div class="section-title">3. Escolha a Massa</div>
        <div id="list-massa" class="item-grid"></div>

        <div class="section-title">4. Escolha a Carne</div>
        <div id="list-carne" class="item-grid"></div>

        <div class="section-title">5. Bebidas e Sobremesas</div>
        <div id="list-extra" class="item-grid"></div>
    </div>

    <button onclick="abrirAdm()" style="margin-top:50px; background:none; border:none; color:#222; width:100%;">[ CONFIGURAÇÕES ]</button>

    <div id="panel-adm">
        <h3 style="color:var(--primary);">Painel de Controle</h3>
        <input type="text" id="adm-nome" placeholder="Nome do item (ex: Coca-Cola 2L)">
        <select id="adm-cat" onchange="checkPriceField()">
            <option value="base">Arroz / Base</option>
            <option value="feijao">Feijão</option>
            <option value="massa">Massa</option>
            <option value="carne">Carne</option>
            <option value="extra">Bebida ou Sobremesa (Com Preço)</option>
        </select>
        <div id="price-field" style="display:none;">
            <label>Preço do Item (R$):</label>
            <input type="number" id="adm-preco" placeholder="0.00" step="0.01">
        </div>
        <button onclick="adicionarItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; font-weight:bold; border-radius:8px;">CADASTRAR NO CARDÁPIO</button>
        
        <h4 style="margin-top:20px;">Itens Ativos:</h4>
        <div id="adm-lista-geral"></div>
        <button onclick="fecharAdm()" style="width:100%; margin-top:10px; background:#444; color:white; border:none; padding:10px; border-radius:8px;">FECHAR PAINEL</button>
    </div>
</div>

<div class="footer">
    <div class="total-box">
        <small id="resumo-qtd">Selecione os itens</small>
        <b id="total-txt">R$ 0,00</b>
    </div>
    <button class="btn-whatsapp" onclick="enviarPedido()">FECHAR PEDIDO</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sc_db_v3')) || [];
    let selecionados = [];

    function abrirAdm() {
        if(prompt("Senha Administrativa:") === "123") {
            document.getElementById('panel-adm').style.display = 'block';
            renderAdm();
        }
    }

    function fecharAdm() { document.getElementById('panel-adm').style.display = 'none'; }

    function checkPriceField() {
        const cat = document.getElementById('adm-cat').value;
        document.getElementById('price-field').style.display = (cat === 'extra') ? 'block' : 'none';
    }

    function adicionarItem() {
        const nome = document.getElementById('adm-nome').value.toUpperCase();
        const cat = document.getElementById('adm-cat').value;
        const preco = parseFloat(document.getElementById('adm-preco').value) || 0;
        
        if(nome) {
            db.push({id: Date.now(), cat, nome, preco});
            localStorage.setItem('sc_db_v3', JSON.stringify(db));
            document.getElementById('adm-nome').value = "";
            document.getElementById('adm-preco').value = "";
            renderMenu();
            renderAdm();
        }
    }

    function removerItem(id) {
        db = db.filter(item => item.id !== id);
        localStorage.setItem('sc_db_v3', JSON.stringify(db));
        renderMenu();
        renderAdm();
    }

    function renderMenu() {
        const categorias = ['base', 'feijao', 'massa', 'carne', 'extra'];
        categorias.forEach(cat => {
            const div = document.getElementById(`list-${cat}`);
            const itensCat = db.filter(i => i.cat === cat);
            div.innerHTML = itensCat.map(i => {
                const isSelected = selecionados.some(s => s.id === i.id);
                const precoExibido = i.preco > 0 ? `<span class="price-tag">+ R$ ${i.preco.toFixed(2)}</span>` : '';
                return `
                    <div class="btn-item ${isSelected ? 'selected' : ''}" onclick="toggleItem(${i.id})">
                        ${i.nome}
                        ${precoExibido}
                    </div>
                `;
            }).join("");
        });
        atualizarTotal();
    }

    function renderAdm() {
        const div = document.getElementById('adm-lista-geral');
        div.innerHTML = db.map(i => `
            <div class="adm-list-item">
                <span>[${i.cat.toUpperCase()}] ${i.nome} ${i.preco > 0 ? '- R$ '+i.preco.toFixed(2) : ''}</span>
                <span style="color:#ff4444; font-weight:bold; cursor:pointer;" onclick="removerItem(${i.id})">EXCLUIR</span>
            </div>
        `).join("");
    }

    function toggleItem(id) {
        const item = db.find(i => i.id === id);
        const index = selecionados.findIndex(s => s.id === id);
        
        if(index > -1) {
            selecionados.splice(index, 1);
        } else {
            selecionados.push(item);
        }
        renderMenu();
    }

    function atualizarTotal() {
        let temComida = selecionados.some(s => ['base', 'feijao', 'massa', 'carne'].includes(s.cat));
        let total = temComida ? 15.00 : 0;
        
        // Soma apenas os preços dos extras (bebidas/sobremesas)
        selecionados.forEach(s => {
            if(s.cat === 'extra') total += s.preco;
        });

        document.getElementById('total-txt').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('resumo-qtd').innerText = `${selecionados.length} itens no carrinho`;
    }

    function enviarPedido() {
        if(selecionados.length === 0) return alert("Selecione os itens!");
        
        const total = document.getElementById('total-txt').innerText;
        let msg = `*NOVO PEDIDO - SABOR & CIA*%0A`;
        msg += `----------------------------%0A`;
        msg += `*ITENS:*%0A- ` + selecionados.map(s => s.nome).join('%0A- ') + `%0A`;
        msg += `----------------------------%0A`;
        msg += `*TOTAL: ${total}*%0A%0A`;
        msg += `_Agendamento para o Final de Semana._`;
        
        window.open(`https://wa.me/5547997909412?text=${msg}`);
    }

    renderMenu();
</script>

</body>
</html>
