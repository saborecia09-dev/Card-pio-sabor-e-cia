<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Cia - Cardápio Dinâmico</title>
    <style>
        :root { --primary: #ff6600; --dark: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; padding-bottom: 100px; }
        
        header { background: #000; border-bottom: 4px solid var(--primary); text-align: center; padding: 20px; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .section-title { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin: 25px 0 10px; font-weight: bold; }

        /* Card do Cliente */
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Carrinho */
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 3px solid var(--primary); padding: 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .btn-whatsapp { background: #25d366; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Área ADM Oculta */
        #area-adm { display: none; background: #222; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed var(--primary); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn-salvar { background: var(--primary); color: white; width: 100%; padding: 10px; border: none; font-weight: bold; border-radius: 5px; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <h1>SABOR & CIA</h1>
    <p style="font-size: 0.8rem; color: #999;">PRESIDENTE GETÚLIO - SC</p>
</header>

<div class="container">
    <div class="section-title">NOSSO CARDÁPIO (R$ 15,00)</div>
    <div id="cardapio-cliente">
        </div>

    <div class="section-title">MEU PEDIDO</div>
    <div id="lista-resumo" style="font-size: 0.9rem; color: #bbb;">Nenhum item...</div>

    <button onclick="acessarADM()" style="margin-top: 50px; background: none; border: none; color: #333; font-size: 0.7rem; width: 100%;">[ ACESSO ADM ]</button>

    <div id="area-adm">
        <h3 style="color: var(--primary); margin-top: 0;">PAINEL DO DONO</h3>
        <label>Nome do Prato:</label>
        <input type="text" id="novo-prato-nome" placeholder="Ex: Feijoada Completa">
        <label>Descrição:</label>
        <input type="text" id="novo-prato-desc" placeholder="Ex: Arroz, couve e farofa">
        <button class="btn-salvar" onclick="salvarPrato()">ADICIONAR AO CARDÁPIO</button>
        
        <div style="margin-top: 20px;">
            <h4>Gerenciar Pratos:</h4>
            <div id="gerenciar-itens"></div>
        </div>
        <button onclick="document.getElementById('area-adm').style.display='none'" style="background:gray; color:white; width:100%; margin-top:10px; border:none; padding:5px;">FECHAR ADM</button>
    </div>
</div>

<div class="footer-cart">
    <div>
        <small style="color: #999;">Total:</small><br>
        <b id="total-txt" style="font-size: 1.4rem; color: var(--primary);">R$ 0,00</b>
    </div>
    <button class="btn-whatsapp" onclick="enviar()">PEDIR NO WHATSAPP</button>
</div>

<script>
    // Banco de Dados Local para os Pratos
    let pratos = JSON.parse(localStorage.getItem('sc_cardapio_v1')) || [
        {n: "FRANGO GRELHADO", d: "Arroz, Feijão, Frango e Legumes"},
        {n: "CARNE MOÍDA", d: "Arroz, Feijão e Carne Moída"}
    ];
    let carrinho = [];

    function acessarADM() {
        let senha = prompt("Digite a senha administrativa:");
        if(senha === "123") {
            document.getElementById('area-adm').style.display = 'block';
            renderADM();
        } else {
            alert("Senha incorreta!");
        }
    }

    function salvarPrato() {
        const nome = document.getElementById('novo-prato-nome').value.toUpperCase();
        const desc = document.getElementById('novo-prato-desc').value;
        if(nome) {
            pratos.push({n: nome, d: desc});
            localStorage.setItem('sc_cardapio_v1', JSON.stringify(pratos));
            document.getElementById('novo-prato-nome').value = "";
            document.getElementById('novo-prato-desc').value = "";
            render();
            renderADM();
        }
    }

    function removerPrato(i) {
        if(confirm("Remover este prato do cardápio?")) {
            pratos.splice(i, 1);
            localStorage.setItem('sc_cardapio_v1', JSON.stringify(pratos));
            render();
            renderADM();
        }
    }

    function render() {
        const pCliente = document.getElementById('cardapio-cliente');
        pCliente.innerHTML = pratos.map((p, i) => `
            <div class="card">
                <div>
                    <b>${p.n}</b>
                    <span style="font-size: 0.8rem; color: #999;">${p.d}</span>
                </div>
                <button class="btn-add" onclick="addCar('${p.n}')">+</button>
            </div>
        `).join("");
    }

    function renderADM() {
        const gItens = document.getElementById('gerenciar-itens');
        gItens.innerHTML = pratos.map((p, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#333; padding:5px; border-radius:5px;">
                <span>${p.n}</span>
                <button class="btn-delete" onclick="removerPrato(${i})">Remover</button>
            </div>
        `).join("");
    }

    function addCar(n) {
        carrinho.push(n);
        atualizarResumo();
    }

    function atualizarResumo() {
        const res = document.getElementById('lista-resumo');
        const tot = document.getElementById('total-txt');
        
        if(carrinho.length === 0) {
            res.innerHTML = "Nenhum item...";
            tot.innerText = "R$ 0,00";
            return;
        }

        let valor = carrinho.length * 15;
        if(carrinho.length === 7) valor = 100;
        if(carrinho.length === 15) valor = 200;

        res.innerHTML = carrinho.map((item, i) => `<div>${i+1}. ${item}</div>`).join("");
        tot.innerText = `R$ ${valor.toFixed(2)}`;
    }

    function enviar() {
        if(carrinho.length === 0) return alert("Selecione um prato!");
        const texto = `*NOVO PEDIDO - SABOR & CIA*%0A${carrinho.join('%0A')}%0A%0A*TOTAL: ${document.getElementById('total-txt').innerText}*`;
        window.open(`https://wa.me/5547997909412?text=${texto}`);
    }

    // Inicializa o cardápio ao abrir
    render();
</script>

</body>
</html>
