<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Cia - Marmitas Congeladas</title>
    <style>
        :root { --primary: #ff6600; --dark: #000000; --card-bg: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding-bottom: 120px; }
        
        header { background: #000; padding: 25px; text-align: center; border-bottom: 3px solid var(--primary); }
        .logo { color: var(--primary); font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .promo-banner { background: var(--primary); color: #000; font-weight: bold; font-size: 0.8rem; padding: 5px; text-align: center; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .categoria-titulo { color: var(--primary); font-size: 1.2rem; border-bottom: 1px solid #333; padding: 20px 0 10px; margin-bottom: 15px; }
        
        .card-item { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .marmita-builder { background: #222; border: 2px dashed var(--primary); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .lista-escolhidos { font-size: 0.9rem; color: #bbb; margin: 10px 0; }

        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; border-top: 2px solid var(--primary); box-sizing: border-box; z-index: 1000; }
        .precos-resumo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-whatsapp { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        .badge-desconto { background: #fff; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 5px; }

        /* Estilo para a área ADM */
        .admin-link { position: absolute; top: 10px; right: 10px; color: #333; font-size: 0.7rem; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-link" onclick="solicitarSenha()">ADMIN</div>

<div class="promo-banner">7 DIAS: R$ 150 | 15 DIAS: R$ 290 (Economize fechando o kit!)</div>

<header>
    <h1 class="logo">Sabor & Cia</h1>
    <div style="font-size: 0.8rem; color: #888;">Presidente Getúlio - SC</div>
</header>

<div class="container">
    <div class="marmita-builder" id="builder">
        <h3 style="margin:0; color:var(--primary)">Monte sua Marmita</h3>
        <p style="font-size: 0.8rem; margin: 5px 0;">Selecione os itens abaixo (máx. 1 proteína)</p>
        <div class="lista-escolhidos" id="escolhidos-atual">Nenhum item selecionado</div>
        <button onclick="fecharMarmita()" id="btn-fechar-marmita" style="background:var(--primary); color:#000; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; display:none; width:100%">Concluir esta Marmita</button>
    </div>

    <div id="cardapio-lista"></div>
</div>

<div class="footer-cart">
    <div class="precos-resumo">
        <div>
            <span id="contador-marmitas" style="font-weight:bold; color:var(--primary)">0 Marmitas</span>
        </div>
        <div style="text-align: right;">
            <div id="total-valor" style="font-size: 1.3rem; font-weight:bold;">R$ 0,00</div>
            <div id="msg-desconto" style="font-size: 0.7rem; color: #25d366;"></div>
        </div>
    </div>
    <button class="btn-whatsapp" onclick="enviarPedido()">Enviar Pedido (WhatsApp)</button>
</div>

<div id="modal-adm" class="modal">
    <div style="max-width: 400px; margin: auto; background:#1a1a1a; padding:20px; border-radius:10px; border:1px solid var(--primary)">
        <h2 style="color:var(--primary)">Gerenciar Itens</h2>
        <input type="text" id="adm-nome" placeholder="Nome do Alimento" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="adm-cat" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="Proteína">Proteína (Apenas 1 p/ marmita)</option>
            <option value="Acompanhamento">Acompanhamento</option>
            <option value="Bebida">Bebida (Extra)</option>
        </select>
        <button onclick="salvarItem()" style="width:100%; background:var(--primary); padding:10px; border:none; font-weight:bold; cursor:pointer">Adicionar Item</button>
        <div id="lista-itens-adm" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
        <button onclick="fecharModal()" style="width:100%; background:#333; color:white; padding:10px; border:none; margin-top:10px; cursor:pointer">Voltar</button>
    </div>
</div>

<script>
    const WHATSAPP = "5547997909412";
    const SENHA_ADM = "19019523";

    let itens = JSON.parse(localStorage.getItem('sabor_cia_cardapio')) || [
        {nome: "Frango Grelhado", cat: "Proteína"},
        {nome: "Carne Moída", cat: "Proteína"},
        {nome: "Arroz Branco", cat: "Acompanhamento"},
        {nome: "Feijão", cat: "Acompanhamento"},
        {nome: "Cenoura e Batata", cat: "Acompanhamento"}
    ];

    let carrinhoMarmitas = []; // Lista de marmitas finalizadas
    let marmitaEmMontagem = []; // Itens da marmita atual

    function renderCardapio() {
        const container = document.getElementById('cardapio-lista');
        container.innerHTML = "";
        
        ["Proteína", "Acompanhamento", "Bebida"].forEach(cat => {
            const filtrados = itens.filter(i => i.cat === cat);
            if(filtrados.length > 0) {
                container.innerHTML += `<div class="categoria-titulo">${cat}s</div>`;
                filtrados.forEach(item => {
                    container.innerHTML += `
                        <div class="card-item">
                            <span>${item.nome}</span>
                            <button class="btn-add" onclick="adicionarAoBuilder('${item.nome}', '${item.cat}')">+</button>
                        </div>
                    `;
                });
            }
        });
    }

    function adicionarAoBuilder(nome, cat) {
        if(cat === 'Proteína' && marmitaEmMontagem.some(i => i.cat === 'Proteína')) {
            alert("Apenas 1 proteína por marmita!");
            return;
        }
        if(cat === 'Bebida') {
            carrinhoMarmitas.push({nome: nome, preco: 0, tipo: 'bebida'}); // Lógica simples para extras
        } else {
            marmitaEmMontagem.push({nome, cat});
            document.getElementById('btn-fechar-marmita').style.display = 'block';
        }
        atualizarBuilder();
    }

    function atualizarBuilder() {
        const lista = document.getElementById('escolhidos-atual');
        lista.innerText = marmitaEmMontagem.length > 0 ? marmitaEmMontagem.map(i => i.nome).join(", ") : "Selecione os itens abaixo...";
        atualizarResumoTotal();
    }

    function fecharMarmita() {
        if(!marmitaEmMontagem.some(i => i.cat === 'Proteína')) {
            alert("Adicione uma proteína à sua marmita!");
            return;
        }
        carrinhoMarmitas.push({itens: [...marmitaEmMontagem], tipo: 'marmita'});
        marmitaEmMontagem = [];
        document.getElementById('btn-fechar-marmita').style.display = 'none';
        atualizarBuilder();
        atualizarResumoTotal();
    }

    function atualizarResumoTotal() {
        const qtdMarmitas = carrinhoMarmitas.filter(i => i.tipo === 'marmita').length;
        let total = qtdMarmitas * 22;
        let descontoMsg = "";

        if(qtdMarmitas >= 15) {
            total = 290;
            descontoMsg = "Combo 15 Dias Ativado!";
        } else if(qtdMarmitas >= 7) {
            total = 150;
            descontoMsg = "Combo 7 Dias Ativado!";
        }

        document.getElementById('contador-marmitas').innerText = `${qtdMarmitas} Marmitas Prontas`;
        document.getElementById('total-valor').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('msg-desconto').innerText = descontoMsg;
    }

    function enviarPedido() {
        const qtd = carrinhoMarmitas.filter(i => i.tipo === 'marmita').length;
        if(qtd === 0) return alert("Monte pelo menos uma marmita!");

        let texto = `*NOVO PEDIDO - SABOR & CIA*\n--------------------------\n`;
        carrinhoMarmitas.forEach((m, index) => {
            if(m.tipo === 'marmita') {
                texto += `*Marmita ${index + 1}:* ${m.itens.map(i => i.nome).join(", ")}\n`;
            } else {
                texto += `*Extra:* ${m.nome}\n`;
            }
        });
        
        texto += `\n--------------------------\n*TOTAL: ${document.getElementById('total-valor').innerText}*`;
        const url = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(texto)}`;
        window.open(url, '_blank');
    }

    // Funções ADM
    function solicitarSenha() {
        if(prompt("Senha ADM:") === SENHA_ADM) {
            document.getElementById('modal-adm').style.display = 'block';
            renderAdm();
        }
    }

    function salvarItem() {
        const nome = document.getElementById('adm-nome').value;
        const cat = document.getElementById('adm-cat').value;
        if(nome) {
            itens.push({nome, cat});
            localStorage.setItem('sabor_cia_cardapio', JSON.stringify(itens));
            renderCardapio();
            renderAdm();
            document.getElementById('adm-nome').value = "";
        }
    }

    function renderAdm() {
        const lista = document.getElementById('lista-itens-adm');
        lista.innerHTML = itens.map((it, idx) => `
            <div style="display:flex; justify-content:space-between; color:white; padding:5px; border-bottom:1px solid #333">
                <span>${it.nome}</span>
                <button onclick="removerItem(${idx})" style="color:red; background:none; border:none; cursor:pointer">X</button>
            </div>
        `).join("");
    }

    function removerItem(idx) {
        itens.splice(idx, 1);
        localStorage.setItem('sabor_cia_cardapio', JSON.stringify(itens));
        renderCardapio();
        renderAdm();
    }

    function fecharModal() { document.getElementById('modal-adm').style.display = 'none'; }

    renderCardapio();
</script>

</body>
</html>
