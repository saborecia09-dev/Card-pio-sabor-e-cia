<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Cia - Cardápio Digital</title>
    <style>
        :root { --primary: #ff6600; --dark: #2c3e50; --bg: #f4f4f4; --success: #27ae60; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 120px; color: var(--dark); }
        header { background: var(--dark); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--primary); }
        .banner { background: var(--primary); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 0.9rem; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-aleatorio { background: var(--dark); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-zap { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 50%; }
        .item-car { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); font-size: 0.9rem; position: relative; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .remove { color: red; font-weight: bold; position: absolute; right: 10px; top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">SABOR & CIA</h1>
    <small>Marmitas 500ml - Presidente Getúlio - SC</small>
</header>

<div class="banner">
    🍱 7 POR R$ 100 | 15 POR R$ 200 (Ou R$ 15 un.)
</div>

<div class="container">
    <h3>1. Como deseja receber?</h3>
    <select id="metodo-envio">
        <option value="Entrega">Entrega (Informar endereço no Zap)</option>
        <option value="Retirada">Vou retirar no balcão</option>
    </select>

    <h3 style="margin-top:20px;">2. Monte sua Marmita:</h3>
    <div class="card">
        <label><b>Escolha a Proteína:</b></label>
        <select id="prod-nome">
            <option value="Frango Grelhado">Frango Grelhado</option>
            <option value="Carne Moída">Carne Moída</option>
            <option value="Linguiça Toscana">Linguiça Toscana</option>
        </select>
        <label><b>Observações (Ex: Sem cebola, dobro de arroz):</b></label>
        <textarea id="prod-obs" placeholder="Alguma restrição ou alteração?"></textarea>
        <button class="btn-add" onclick="addMarmita()">+ ADICIONAR MARMITA (R$ 15,00)</button>
    </div>

    <button class="btn-aleatorio" onclick="addAleatorio()">🎲 MONTAR COMBO ALEATÓRIO</button>

    <h3 style="margin-top:20px;">Seu Pedido:</h3>
    <div id="lista-carrinho">Carrinho vazio...</div>
</div>

<div class="footer">
    <div style="width: 45%;">
        <small>TOTAL</small><br>
        <b id="total-txt" style="font-size: 1.4rem;">R$ 0,00</b>
    </div>
    <button class="btn-zap" onclick="enviarZap()">FINALIZAR PEDIDO</button>
</div>

<script>
    let carrinho = [];
    const sabores = ["Frango Grelhado", "Carne Moída", "Linguiça Toscana"];

    function addMarmita() {
        const nome = document.getElementById('prod-nome').value;
        const obs = document.getElementById('prod-obs').value || "Padrão";
        carrinho.push({ nome, obs });
        document.getElementById('prod-obs').value = ""; // limpa obs
        render();
    }

    function addAleatorio() {
        const qtd = prompt("Quantas marmitas aleatórias deseja adicionar?", "7");
        if (qtd > 0) {
            for (let i = 0; i < qtd; i++) {
                const sorteio = sabores[Math.floor(Math.random() * sabores.length)];
                carrinho.push({ nome: sorteio, obs: "Sorteio Aleatório" });
            }
            render();
        }
    }

    function remover(i) {
        carrinho.splice(i, 1);
        render();
    }

    function render() {
        const divCar = document.getElementById('lista-carrinho');
        const txtTotal = document.getElementById('total-txt');
        let total = 0;
        let qtd = carrinho.length;

        // Lógica de Combos Sabor & Cia
        if (qtd === 7) total = 100;
        else if (qtd === 15) total = 200;
        else total = qtd * 15;

        txtTotal.innerText = `R$ ${total.toFixed(2)}`;

        if(qtd === 0) {
            divCar.innerHTML = "Carrinho vazio...";
        } else {
            divCar.innerHTML = carrinho.map((item, i) => `
                <div class="item-car">
                    <span class="remove" onclick="remover(${i})">X</span>
                    <b>${i+1}. ${item.nome}</b><br>
                    <small>Obs: ${item.obs}</small>
                </div>
            `).join("");
        }
    }

    function enviarZap() {
        if(carrinho.length === 0) return alert("Adicione marmitas ao carrinho!");
        
        const metodo = document.getElementById('metodo-envio').value;
        const total = document.getElementById('total-txt').innerText;
        
        let msg = `*NOVO PEDIDO - SABOR & CIA*%0A`;
        msg += `*Metodo:* ${metodo}%0A`;
        msg += `----------------------------%0A`;
        msg += `*MARMITAS:*%0A`;
        carrinho.forEach((item, idx) => {
            msg += `${idx+1}. ${item.nome} (${item.obs})%0A`;
        });
        msg += `----------------------------%0A`;
        msg += `*TOTAL DO PEDIDO: ${total}*%0A%0A`;
        msg += `_Pode confirmar o endereço caso seja entrega?_`;

        window.open(`https://wa.me/5547997909412?text=${msg}`);
    }
</script>

</body>
</html>
